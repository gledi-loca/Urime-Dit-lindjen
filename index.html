<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gëzuar Ditëlindjen! ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }
        h1 {
            color: #ff3366;
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(255, 51, 102, 0.8);
            margin: 0;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); text-shadow: 0 0 10px rgba(255, 51, 102, 0.6); }
            100% { transform: scale(1.05); text-shadow: 0 0 25px rgba(255, 51, 102, 1); }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <h1>Gëzuar Ditëlindjen! ❤️</h1>
    </div>

    <canvas id="heart"></canvas>

    <script>
        window.requestAnimationFrame = window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.oRequestAnimationFrame || window.msRequestAnimationFrame || function (callback) { window.setTimeout(callback, 1000 / 60); };
        window.init = function () {
            var canvas = document.getElementById('heart'),
                ctx = canvas.getContext('2d'),
                width = canvas.width = window.innerWidth,
                height = canvas.height = window.innerHeight,
                rand = Math.random;

            ctx.fillStyle = "rgba(0,0,0,1)";
            ctx.fillRect(0, 0, width, height);

            var heartPosition = function (rad) {
                return [Math.pow(Math.sin(rad), 3), -(13 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))];
            };

            var scaleAndTranslate = function (pos, sx, sy, dx, dy) {
                return [dx + pos[0] * sx, dy + pos[1] * sy];
            };

            window.addEventListener('resize', function () {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            var traceCount = 50,
                pointsOrigin = [],
                dr = 0.1,
                i;

            for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 210, 13, 0, 0));
            for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 150, 9, 0, 0));
            for (i = 0; i < Math.PI * 2; i += dr) pointsOrigin.push(scaleAndTranslate(heartPosition(i), 90, 5, 0, 0));

            var heartPointsCount = pointsOrigin.length,
                targetPoints = [];

            var pulse = function () {
                var koef = 13 + 9 * Math.sin(Date.now() * 0.003);
                var sizeX = 13 * koef;
                var sizeY = 9 * koef;
                for (i = 0; i < heartPointsCount; i++) {
                    targetPoints[i] = scaleAndTranslate(pointsOrigin[i], sizeX / 210, sizeY / 13, width / 2, height / 2);
                }
            };

            var e = [];
            for (i = 0; i < heartPointsCount; i++) {
                var x = rand() * width;
                var y = rand() * height;
                e[i] = {
                    vx: 0,
                    vy: 0,
                    R: 2,
                    speed: rand() * 5 + 5,
                    q: ~~(rand() * heartPointsCount),
                    D: 2 * (i % 2) - 1,
                    force: 0.2 * rand() + 0.7,
                    f: "hsla(0," + ~~(40 * rand() + 60) + "%," + ~~(60 * rand() + 20) + "%,.3)",
                    trace: []
                };
                for (var k = 0; k < traceCount; k++) e[i].trace[k] = { x: x, y: y };
            }

            var config = { traceK: 0.4, timeDelta: 0.01 };
            var time = 0;

            var loop = function () {
                var n = Date.now();
                ctx.fillStyle = "rgba(0,0,0,.1)";
                ctx.fillRect(0, 0, width, height);
                pulse();
                for (i = 0; i < heartPointsCount; i++) {
                    var p = e[i];
                    var target = targetPoints[p.q];
                    var dx = p.trace[0].x - target[0];
                    var dy = p.trace[0].y - target[1];
                    var length = Math.sqrt(dx * dx + dy * dy);
                    if (length < 10) {
                        if (rand() > 0.95) {
                            p.q = ~~(rand() * heartPointsCount);
                        } else {
                            if (rand() > 0.99) {
                                p.D *= -1;
                            }
                            p.q += p.D;
                            p.q %= heartPointsCount;
                            if (p.q < 0) p.q += heartPointsCount;
                        }
                    }
                    p.vx += -dx / length * p.speed;
                    p.vy += -dy / length * p.speed;
                    p.trace[0].x += p.vx;
                    p.trace[0].y += p.vy;
                    p.vx *= 0.1;
                    p.vy *= 0.1;
                    for (var k = 0; k < traceCount - 1; k++) {
                        var T = p.trace[k];
                        var N = p.trace[k + 1];
                        N.x += config.traceK * (T.x - N.x);
                        N.y += config.traceK * (T.y - N.y);
                    }
                    ctx.fillStyle = p.f;
                    for (var k = 0; k < traceCount; k++) {
                        ctx.fillRect(p.trace[k].x, p.trace[k].y, 1, 1);
                    }
                }
                window.requestAnimationFrame(loop, canvas);
            };
            loop();
        };

        var s = document.readyState;
        if (s === 'complete' || s === 'loaded' || s === 'interactive') window.init();
        else window.addEventListener('DOMContentLoaded', window.init, false);
    </script>
</body>
</html>
