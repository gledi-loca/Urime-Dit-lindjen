<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Urime Arsa! 🎂</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            color: #ff3366;
            text-shadow: 0 0 20px #ff3366;
        }
        h1 { font-size: 3rem; margin: 0; }
        .torta { font-size: 5rem; margin: 10px 0; }
        p { font-size: 1.5rem; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="text-container">
        <h1>Gëzuar Ditëlindjen Arsa! ❤️</h1>
        <div class="torta">🎂</div>
        <p>100 vite të lumtura! 🎈🎉</p>
    </div>
    <canvas id="heart"></canvas>
    <script>
        var canvas = document.getElementById('heart');
        var ctx = canvas.getContext('2d');
        var width = canvas.width = window.innerWidth;
        var height = canvas.height = window.innerHeight;
        var points = [];
        for (var i = 0; i < Math.PI * 2; i += 0.05) {
            var x = 16 * Math.pow(Math.sin(i), 3);
            var y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));
            points.push({ x: x * 20 + width / 2, y: y * 20 + height / 2 });
        }
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#ff3366";
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
